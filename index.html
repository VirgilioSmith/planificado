<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Metas Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            glow: '#3b82f6', /* Ajustado a un azul más similar a la imagen */
                            dark: '#0f172a', /* Ajustado al fondo de la imagen */
                            surface: 'rgba(30, 41, 59, 0.6)',
                            card: '#1e293b' /* Color de tarjeta similar a la imagen */
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards', /* Ligeramente más suave */
                        'glow-pulse': 'glowPulse 3s infinite alternate',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' }, /* Movimiento más sutil */
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        glowPulse: {
                            '0%': { boxShadow: '0 0 15px rgba(168, 85, 247, 0.2)' },
                            '100%': { boxShadow: '0 0 30px rgba(168, 85, 247, 0.6)' }
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; /* Fondo base adaptado a la imagen */
            color: #e2e8f0;
        }

        :root {
            --brand-blue: #3b82f6; /* El azul principal */
            --brand-glow: #60a5fa;
            --brand-success: #10b981; /* Verde esmeralda para éxito */
            --brand-success-glow: rgba(16, 185, 129, 0.2);
            --brand-current-month: #8b5cf6; /* Morado distintivo para mes actual */
        }

        .progress-bar-fill {
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1), background-color 0.8s ease;
        }

        /* ── Scrollbars Ultra Elegantes ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.2); border-radius: 10px; transition: background 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.5); }

        /* ── Efectos Premium ── */
        .glass-panel {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.5) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); /* Sombra más suave */
            border-radius: 20px; /* Bordes de la imagen */
        }

        .glass-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ── Transiciones de Vistas ── */
        .view-section { transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .view-hidden { opacity: 0; pointer-events: none; position: absolute; visibility: hidden; transform: scale(0.97) translateY(5px); }
        .view-active { opacity: 1; pointer-events: auto; position: relative; visibility: visible; transform: scale(1) translateY(0); }

        /* ── Matriz Continua Estilo SaaS ── */
        .matrix-grid-layout { display: grid; align-items: stretch; }
        
        .sticky-col-racha { 
            position: sticky; left: 0; z-index: 10; 
            background-color: #1e293b; 
            transition: background-color 0.3s ease;
        }
        .sticky-col-nombre { 
            position: sticky; left: 5rem; z-index: 10; 
            background-color: #1e293b;
            transition: background-color 0.3s ease;
        }
        
        /* Sombra de profundidad al deslizar la matriz */
        .sticky-col-nombre::after {
            content: ''; position: absolute; top: 0; right: -20px; width: 20px; height: 100%;
            background: linear-gradient(to right, rgba(15,23,42,0.8), transparent); 
            pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
        }
        .is-scrolled .sticky-col-nombre::after { opacity: 1; }

        /* Efecto hover unificado en filas de la matriz sin bordes rígidos */
        .matrix-row { transition: background-color 0.2s ease; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .matrix-row:hover,
        .matrix-row:hover .sticky-col-racha, 
        .matrix-row:hover .sticky-col-nombre {
            background-color: rgba(51, 65, 85, 0.4) !important; 
        }

        /* Celdas estilo píldora flotante (sin bordes cuadrados) */
        .matrix-cell-wrapper {
            padding: 4px 8px;
        }
        .matrix-cell-inner {
            width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 12px; padding: 8px 4px; transition: all 0.3s ease;
        }

        .matrix-cell-success .matrix-cell-inner {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(16, 185, 129, 0.05) 100%);
            box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .matrix-cell-current .matrix-cell-inner {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(139, 92, 246, 0.05) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        /* Botón de Segmento (Toggle) Activo */
        .toggle-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .toggle-btn-active { 
            background: rgba(59, 130, 246, 0.15); /* Azul translúcido */
            color: #60a5fa; /* Azul vibrante */
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2); 
            border-color: rgba(59, 130, 246, 0.3);
        }

        /* ── Ajustes del Leaderboard según imagen ── */
        .leaderboard-row-container {
            display: grid;
            grid-template-columns: 3rem minmax(150px, auto) 2fr 1fr 2rem; /* Columna de nombre adaptable */
            align-items: center;
            gap: 1.5rem;
            padding: 1rem 1.5rem;
        }
        @media (max-width: 768px) {
            .leaderboard-row-container {
                grid-template-columns: 2.5rem 1fr auto;
                grid-template-rows: auto auto;
                gap: 0.5rem;
                padding: 1rem;
            }
            .lb-rank { grid-column: 1; grid-row: 1 / 3; }
            .lb-name { grid-column: 2; grid-row: 1; }
            .lb-progress { grid-column: 2 / -1; grid-row: 2; }
            .lb-amount { grid-column: 3; grid-row: 1; text-align: right; }
            .lb-chevron { display: none; }
        }
    </style>
</head>

    <script>
        // ── CONFIGURACIÓN DE URLS ──
        const sheetId = '1URae8fWw5QuOLo7FdsQr2KP-OqY69GT6Xu9CFHsowXY'; 
        const currentDataUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
        const historicalDataUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=2095726805`;

        const leaderboardContainer = document.getElementById('leaderboard-container');
        const matrixContainer = document.getElementById('matrix-container');
        const matrixHeader = document.getElementById('matrix-header');
        const matrixScrollWrapper = document.getElementById('matrix-scroll-wrapper');
        const matrixScrollInner = document.getElementById('matrix-scroll-inner');
        const loadingState = document.getElementById('loading-state');
        const currentMonthElement = document.getElementById('current-month');
        
        const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        const fullMonthNames = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

        const currencyFormatter = new Intl.NumberFormat('en-US', {
            style: 'currency', currency: 'USD', maximumFractionDigits: 0
        });

        // ── ESTADO GLOBAL Y PREDICCIÓN ──
        let globalProcessedData = [];
        let isPredicting = false;

        function togglePrediction() {
            if(globalProcessedData.length === 0) return;
            
            isPredicting = !isPredicting;
            const btnText = document.getElementById('predict-text');
            const btn = document.getElementById('btn-predict');
            
            if (isPredicting) {
                btnText.innerText = "Restaurar";
                btn.classList.add('animate-glow-pulse', 'border-purple-500', 'bg-indigo-900', 'text-purple-300');
                btn.classList.remove('border-indigo-500/30', 'bg-slate-800', 'text-indigo-300');
            } else {
                btnText.innerText = "Proyectar";
                btn.classList.remove('animate-glow-pulse', 'border-purple-500', 'bg-indigo-900', 'text-purple-300');
                btn.classList.add('border-indigo-500/30', 'bg-slate-800', 'text-indigo-300');
            }
            
            renderHistoricalMatrix(globalProcessedData);
        }

        function formatMonthName(str) {
            if(!str) return "";
            let replaced = str.replace('-', ' ');
            return replaced.replace(/\b\w/g, l => l.toUpperCase());
        }

        function handleMatrixScroll() {
            if (matrixScrollWrapper.scrollLeft > 5) {
                matrixScrollWrapper.classList.add('is-scrolled');
            } else {
                matrixScrollWrapper.classList.remove('is-scrolled');
            }
        }

        function switchView(viewName) {
            const currentView = document.getElementById('view-current');
            const histView = document.getElementById('view-historical');
            const btnCurrent = document.getElementById('btn-view-current');
            const btnHist = document.getElementById('btn-view-historical');

            if (viewName === 'current') {
                histView.classList.replace('view-active', 'view-hidden');
                setTimeout(() => currentView.classList.replace('view-hidden', 'view-active'), 50);
                
                btnCurrent.classList.add('toggle-btn-active');
                btnCurrent.classList.remove('text-slate-400', 'hover:text-slate-200');
                
                btnHist.classList.remove('toggle-btn-active');
                btnHist.classList.add('text-slate-400', 'hover:text-slate-200');
            } else {
                currentView.classList.replace('view-active', 'view-hidden');
                setTimeout(() => histView.classList.replace('view-hidden', 'view-active'), 50);
                
                btnHist.classList.add('toggle-btn-active');
                btnHist.classList.remove('text-slate-400', 'hover:text-slate-200');
                
                btnCurrent.classList.remove('toggle-btn-active');
                btnCurrent.classList.add('text-slate-400', 'hover:text-slate-200');
            }
        }

        function toggleAccordion(id) {
            const content = document.getElementById(`acc-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                requestAnimationFrame(() => content.classList.add('animate-fade-in-up'));
                chevron.classList.add('rotate-180', 'text-brand-glow');
                chevron.classList.remove('text-slate-500');
            } else {
                content.classList.add('hidden');
                content.classList.remove('animate-fade-in-up');
                chevron.classList.remove('rotate-180', 'text-brand-glow');
                chevron.classList.add('text-slate-500');
            }
        }

        function updateCurrentMonth() {
            currentMonthElement.textContent = meses[new Date().getMonth()];
        }

        function parseNumber(val) {
            if (!val) return 0;
            let cleaned = String(val).replace(/[$€A-Za-z\s]/g, '').replace(/,/g, '');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        }
        
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                const values = lines[i].split(regex);
                const rowObject = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = values[j] ? values[j].trim().replace(/"/g, '') : '';
                    rowObject[headers[j]] = val;
                }
                data.push(rowObject);
            }
            return data;
        }

        async function fetchData() {
            setLoading(true);
            try {
                let currentCsvData = "";
                let historicalCsvData = "";

                try {
                    const currentResponse = await fetch(currentDataUrl);
                    if (!currentResponse.ok) throw new Error(`HTTP ${currentResponse.status}`);
                    currentCsvData = await currentResponse.text();
                    if (currentCsvData.trim().startsWith('<!DOCTYPE html>')) throw new Error("Documento no publicado como CSV.");
                } catch (err) {
                    throw new Error("No pudimos conectar con los datos del mes actual. Revisa el enlace: " + err.message);
                }

                try {
                    const historicalResponse = await fetch(historicalDataUrl);
                    if (historicalResponse.ok) {
                        const textData = await historicalResponse.text();
                        if (!textData.trim().startsWith('<!DOCTYPE html>')) {
                            historicalCsvData = textData;
                        }
                    }
                } catch (err) {
                    console.warn("No se pudo obtener el histórico. Se ignorará esta vista temporalmente.", err);
                }

                const currentRaw = parseCSV(currentCsvData);
                const historicalRaw = historicalCsvData ? parseCSV(historicalCsvData) : [];
                
                processAndRenderData(currentRaw, historicalRaw);

            } catch (error) {
                console.error("Error General:", error);
                leaderboardContainer.innerHTML = `
                    <div class="py-12 flex flex-col items-center justify-center text-rose-400 px-4 text-center glass-panel mx-4">
                        <i class="ph-duotone ph-warning-circle text-6xl mb-4 opacity-90"></i>
                        <p class="font-bold text-xl tracking-tight text-white">Conexión Fallida</p>
                        <p class="text-sm mt-2 text-slate-400 max-w-md">${error.message}</p>
                    </div>`;
            } finally {
                setLoading(false);
            }
        }

        function processAndRenderData(currentData, historicalData) {
            const validCurrentData = currentData.filter(item => item.Nombre && item.Nombre.trim() !== '');
            
            const historyMap = {};
            const monthsSet = new Set();
            
            historicalData.forEach(row => {
                if (!row.Nombre || !row.Mes) return;
                const name = row.Nombre.trim();
                const month = row.Mes.trim().toLowerCase(); 
                const progreso = parseNumber(row.Progreso);
                const objetivo = parseNumber(row.Objetivo);
                
                if (!historyMap[name]) historyMap[name] = {};
                historyMap[name][month] = {
                    month: month, ventas: progreso, meta: objetivo,
                    percentage: objetivo > 0 ? (progreso / objetivo) * 100 : 0,
                    isOverGoal: progreso >= objetivo
                };
                monthsSet.add(month);
            });

            const parseMonthYear = (str) => {
                const parts = str.toLowerCase().split('-');
                if(parts.length !== 2) return new Date(0);
                const m = fullMonthNames.indexOf(parts[0]);
                const y = parseInt(parts[1]);
                return new Date(y, m, 1);
            };
            
            const sortedHistoricalMonths = Array.from(monthsSet).sort((a, b) => parseMonthYear(a) - parseMonthYear(b));
            
            const currentDate = new Date();
            const currentMonthName = fullMonthNames[currentDate.getMonth()] + '-' + currentDate.getFullYear();

            const processedData = validCurrentData.map((item, index) => {
                const nombre = item.Nombre.trim();
                const ventas = parseNumber(item.Progreso);
                const meta = parseNumber(item.Objetivo);
                let percentage = meta > 0 ? (ventas / meta) * 100 : 0;
                
                const history = [];
                const userHistory = historyMap[nombre] || {};
                
                sortedHistoricalMonths.forEach(m => {
                    if (userHistory[m]) history.push(userHistory[m]);
                    else history.push({ month: m, ventas: 0, meta: 0, percentage: 0, isOverGoal: false });
                });

                if (!sortedHistoricalMonths.includes(currentMonthName)) {
                     history.push({ month: currentMonthName, ventas: ventas, meta: meta, percentage: percentage, isOverGoal: ventas >= meta });
                }

                // Lógica de racha
                let streak = 0;
                for(let i = history.length - 1; i >= 0; i--) {
                    if (history[i].month === currentMonthName) continue; 
                    if(history[i].isOverGoal && history[i].ventas > 0) streak++;
                    else break; 
                }

                return { id: `user-${index}`, nombre, ventas, meta, percentage, history, streak };
            });

            processedData.sort((a, b) => b.percentage - a.percentage);
            
            globalProcessedData = processedData;
            updateStats(processedData);
            renderHistoricalMatrix(globalProcessedData);
            renderCurrentMonthView(processedData);
        }

        function renderCurrentMonthView(processedData) {
            leaderboardContainer.innerHTML = '';
            if (processedData.length === 0) return;

            processedData.forEach((person, index) => {
                const rank = index + 1;
                const visualPercentage = Math.min(person.percentage, 100);
                
                // Calcular cuánto falta para la meta
                const falta = Math.max(0, person.meta - person.ventas);
                const faltaMonto = falta > 0 ? `FALTA ${currencyFormatter.format(falta)}` : '¡META SUPERADA!';

                // Colores basados en la imagen (Azul por defecto)
                let barColorClass = "bg-[#3b82f6]"; // Azul de la barra
                let barBgClass = "bg-[#1e293b]"; // Fondo oscuro de la barra
                let rankClass = "bg-[#1e293b] text-slate-400 border-slate-700";

                // Ranking colors (1, 2, 3)
                if (rank === 1) rankClass = "bg-[#1e293b] text-amber-500 border-amber-500/50";
                if (rank === 2) rankClass = "bg-[#1e293b] text-slate-300 border-slate-400/50";
                // Acordeón simplificado con Objetivos (Banderitas en vez de línea)
                const historyCardsHtml = person.history.map(h => {
                    if (h.meta === 0 && h.ventas === 0) return '';
                    const isWin = h.isOverGoal;
                    const isCurrentMonth = h.month === fullMonthNames[new Date().getMonth()] + '-' + new Date().getFullYear();
                    
                    let bgCardClass = "bg-slate-800/50 border-slate-700/50";
                    let accentTextClass = "text-slate-400";
                    let titleIcon = "";
                    let flagBg = "bg-slate-700/50 text-slate-400"; // Banderita por defecto

                    if (isCurrentMonth) {
                        bgCardClass = "bg-purple-900/20 border-purple-500/30";
                        accentTextClass = "text-purple-300";
                        titleIcon = `<i class="ph-fill ph-star text-purple-400 text-[10px] mr-1"></i>`;
                        flagBg = "bg-purple-500/20 text-purple-300 border border-purple-500/20";
                    } else if (isWin) {
                        bgCardClass = "bg-emerald-900/10 border-emerald-500/30";
                        accentTextClass = "text-emerald-400";
                        flagBg = "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                    }

                    return `
                        <div class="flex-shrink-0 w-[150px] rounded-xl p-3 ${bgCardClass} border relative overflow-hidden group flex flex-col">
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-xs font-bold ${accentTextClass} capitalize flex items-center">${titleIcon}${formatMonthName(h.month).split(' ')[0]}</span>
                                <span class="text-[10px] font-bold px-1.5 py-0.5 rounded ${isWin?'bg-emerald-500/20 text-emerald-400':'bg-slate-700 text-slate-300'}">${h.percentage.toFixed(0)}%</span>
                            </div>
                            <div class="font-bold text-white text-base mb-2">${currencyFormatter.format(h.ventas)}</div>
                            
                            <!-- Etiqueta Banderita para el Objetivo -->
                            <div class="mt-auto inline-flex items-center gap-1.5 px-2 py-1 rounded-md ${flagBg} text-[9px] font-bold uppercase tracking-wider w-max">
                                <i class="ph-fill ph-flag"></i> Obj: ${currencyFormatter.format(h.meta)}
                            </div>
                        </div>`;
                }).join('');

                // Estructura idéntica a la imagen
                const rowHtml = `
                <div class="bg-brand-dark border border-slate-800 rounded-2xl transition-all duration-300 hover:bg-slate-800/50 cursor-pointer group animate-fade-in-up" style="animation-delay: ${index * 80}ms" onclick="toggleAccordion('${person.id}')">
                    
                    <div class="leaderboard-row-container">
                        <!-- POS -->
                        <div class="lb-rank flex justify-center">
                            <div class="flex items-center justify-center w-10 h-10 rounded-full ${rankClass} border font-bold text-sm shadow-inner">
                                ${rank}
                            </div>
                        </div>

                        <!-- NOMBRE -->
                        <div class="lb-name font-bold text-white text-lg tracking-tight">
                            ${person.nombre}
                        </div>

                        <!-- PROGRESO -->
                        <div class="lb-progress flex flex-col justify-center">
                            <div class="flex justify-between items-center mb-1.5 px-1">
                                <span class="text-sm font-bold text-white">${person.percentage.toFixed(1)}%</span>
                                <span class="text-xs text-slate-500 flex items-center gap-1"><i class="ph-bold ph-target"></i> ${currencyFormatter.format(person.meta)}</span>
                            </div>
                            <div class="w-full ${barBgClass} rounded-full h-2 overflow-hidden">
                                <div class="progress-bar-fill h-full rounded-full ${barColorClass}" style="width: 0%;" data-width="${visualPercentage}%"></div>
                            </div>
                        </div>

                        <!-- FACTURADO -->
                        <div class="lb-amount flex flex-col items-end md:items-end justify-center">
                            <div class="text-xl font-bold text-white tracking-tight">
                                ${currencyFormatter.format(person.ventas)}
                            </div>
                            <div class="text-[10px] text-slate-500 uppercase tracking-wide mt-1">${faltaMonto}</div>
                        </div>
                        
                        <!-- CHEVRON -->
                        <div class="lb-chevron flex items-center justify-center text-slate-500">
                            <i class="ph-bold ph-caret-down text-lg transition-transform duration-300" id="chevron-${person.id}"></i>
                        </div>
                    </div>

                    <!-- Acordeón Histórico -->
                    <div id="acc-${person.id}" class="hidden border-t border-slate-800 bg-slate-900/50 p-4 rounded-b-2xl cursor-default" onclick="event.stopPropagation()">
                        <h4 class="text-[11px] font-bold text-slate-400 mb-3 uppercase tracking-widest flex items-center gap-2">
                            <i class="ph-fill ph-clock-counter-clockwise text-slate-500"></i> Historial Reciente
                        </h4>
                        <div class="flex gap-3 overflow-x-auto pb-2 custom-scrollbar">
                            ${historyCardsHtml || '<div class="text-sm text-slate-500">Sin historial.</div>'}
                        </div>
                    </div>
                </div>`;
                leaderboardContainer.insertAdjacentHTML('beforeend', rowHtml);
            });

            // Activar animación de barras
            requestAnimationFrame(() => {
                setTimeout(() => {
                    document.querySelectorAll('.progress-bar-fill').forEach(bar => { bar.style.width = bar.getAttribute('data-width'); });
                }, 50);
            });
        }

        function renderHistoricalMatrix(data) {
            if(data.length === 0) return;
            let matrixData = JSON.parse(JSON.stringify(data));
            
            if (isPredicting) {
                const currentMonthIdx = new Date().getMonth();
                const currentYear = new Date().getFullYear();
                
                matrixData.forEach(person => {
                    const baseData = person.history[person.history.length - 1]; 
                    let baseMeta = baseData.meta > 0 ? baseData.meta : 1000;
                    
                    for (let i = currentMonthIdx + 1; i <= 11; i++) {
                        person.history.push({
                            month: `${fullMonthNames[i]}-${currentYear}`,
                            ventas: 0, meta: baseMeta * ((i - currentMonthIdx) + 1),
                            percentage: 0, isOverGoal: false, isPrediction: true 
                        });
                    }
                });
            }

            const historyMonths = matrixData[0].history.map(h => h.month);
            const colsCount = historyMonths.length;
            // Name column now adapts (max-content)
            const gridStyle = `grid-template-columns: 5.5rem minmax(160px, max-content) repeat(${colsCount}, minmax(130px, 1fr));`; 
            matrixScrollInner.style.minWidth = `${260 + (colsCount * 130)}px`;

            // Quitamos los bordes verticales (border-r)
            let headerHtml = `
                <div class="sticky-col-racha flex items-center justify-center p-3 text-slate-500 text-xs font-bold uppercase tracking-widest bg-slate-800/80">Racha</div>
                <div class="sticky-col-nombre flex items-center p-3 text-slate-500 text-xs font-bold uppercase tracking-widest bg-slate-800/80">Nombre</div>
            `;
            
            const currentMonthName = fullMonthNames[new Date().getMonth()] + '-' + new Date().getFullYear();

            historyMonths.forEach((month, idx) => {
                const isPredictionCol = matrixData[0].history[idx].isPrediction;
                const isCurrent = month === currentMonthName;
                const monthMeta = Math.max(...matrixData.map(p => p.history[idx].meta));
                
                let titleColor = isCurrent ? 'text-purple-400' : (isPredictionCol ? 'text-purple-400' : 'text-slate-300');
                let bgHeader = isCurrent ? 'bg-purple-900/10' : '';

                headerHtml += `
                    <div class="flex flex-col items-center justify-center text-center py-2 px-3 ${bgHeader}">
                        <span class="${titleColor} font-bold text-xs flex items-center gap-1 uppercase">
                            ${isPredictionCol ? '<i class="ph-fill ph-magic-wand text-[10px]"></i>' : ''} 
                            ${isCurrent ? '<i class="ph-fill ph-star text-[10px]"></i>' : ''}
                            ${formatMonthName(month)}
                        </span>
                        ${monthMeta > 0 ? `<div class="mt-1 text-[9px] text-slate-500 font-medium bg-slate-800/50 px-2 py-0.5 rounded-full flex items-center gap-1"><i class="ph-fill ph-flag"></i> ${currencyFormatter.format(monthMeta)}</div>` : ''}
                    </div>`;
            });
            
            matrixHeader.style = gridStyle;
            matrixHeader.innerHTML = headerHtml;

            matrixData.sort((a, b) => b.streak !== a.streak ? b.streak - a.streak : b.percentage - a.percentage);
            matrixContainer.innerHTML = '';
            
            matrixData.forEach((person, index) => {
                // Racha color Naranjado (fuego)
                let streakBadge = person.streak > 0 
                    ? `<span class="bg-orange-500/10 text-orange-400 border border-orange-500/30 px-2.5 py-1 rounded-md text-xs font-extrabold shadow-[0_0_10px_rgba(249,115,22,0.15)] flex items-center gap-1"><i class="ph-fill ph-fire"></i> ${person.streak}</span>` 
                    : `<span class="text-slate-600 opacity-40">-</span>`;

                let monthsHtml = person.history.map(hist => {
                    if (hist.meta === 0 && hist.ventas === 0 && !hist.isPrediction) return `<div class="matrix-cell-wrapper"><div class="matrix-cell-inner"><span class="text-[10px] text-slate-600 font-medium">N/A</span></div></div>`;

                    const isCurrent = hist.month === currentMonthName;
                    
                    let cellBgClass = "";
                    if (isCurrent) cellBgClass = "matrix-cell-current";
                    else if (hist.isOverGoal && !hist.isPrediction) cellBgClass = "matrix-cell-success";

                    let moneyColor = hist.isPrediction ? 'text-purple-300' : (hist.isOverGoal ? 'text-emerald-400' : 'text-slate-200');
                    let pctClass = hist.isOverGoal ? 'text-emerald-400' : (hist.percentage >= 80 ? 'text-amber-400' : 'text-slate-400');
                    
                    // Colores de barra de progreso en matriz
                    let barColor = 'bg-slate-600';
                    if (hist.isOverGoal) barColor = 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]';
                    else if (isCurrent) barColor = 'bg-purple-500';
                    else if (hist.percentage > 0) barColor = 'bg-blue-500';

                    // Celdas sin borde lateral, flotantes
                    return `
                        <div class="matrix-cell-wrapper ${cellBgClass}">
                            <div class="matrix-cell-inner group-hover:scale-105 transition-transform">
                                <div class="font-bold ${moneyColor} text-[13px] mb-0.5">${hist.ventas > 0 || hist.isPrediction ? currencyFormatter.format(hist.ventas) : '$0'}</div>
                                <div class="text-[10px] font-medium ${pctClass}">${hist.percentage.toFixed(0)}%</div>
                                <div class="w-2/3 mt-2 h-[3px] bg-slate-800/80 rounded-full overflow-hidden"><div class="h-full rounded-full ${barColor}" style="width: ${Math.min(hist.percentage, 100)}%"></div></div>
                            </div>
                        </div>`;
                }).join('');

                // Fila sin bordes verticales
                const rowHtml = `
                    <div class="matrix-grid-layout matrix-row animate-fade-in-up group" style="${gridStyle}; animation-delay: ${index * 30}ms">
                        <div class="sticky-col-racha flex justify-center items-center p-3 bg-[#1e293b]">${streakBadge}</div>
                        <div class="sticky-col-nombre font-bold text-slate-200 text-sm whitespace-nowrap overflow-hidden text-ellipsis p-3 bg-[#1e293b]">${person.nombre}</div>
                        ${monthsHtml}
                    </div>`;
                matrixContainer.insertAdjacentHTML('beforeend', rowHtml);
            });
            handleMatrixScroll();
        }

        function updateStats(data) {
            document.getElementById('stat-total-team').innerText = data.length;
            document.getElementById('stat-achievers').innerText = data.filter(p => p.ventas >= p.meta).length;
            document.getElementById('stat-total-money').innerText = currencyFormatter.format(data.reduce((s, p) => s + p.ventas, 0));
        }

        function setLoading(isLoading) {
            loadingState.style.display = isLoading ? 'flex' : 'none';
        }

        window.onload = () => {
            updateCurrentMonth();
            fetchData();
        };
    </script>
</body>
</html>
