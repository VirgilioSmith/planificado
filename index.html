<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Metas Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155'
                        },
                        brand: {
                            glow: '#3b82f6'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in-up': 'fadeInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }

        .progress-bar-fill {
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s ease;
        }

        /* ── Custom Scrollbars Elegantes ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(51, 65, 85, 0.5); border-radius: 10px; transition: background 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.8); }

        .glass-header {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* ── Estructura del item del leaderboard (Mes Actual) ── */
        .leaderboard-item {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(51, 65, 85, 0.3);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .leaderboard-item:hover {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(71, 85, 105, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -10px rgba(0,0,0,0.5);
        }

        .leaderboard-row {
            display: grid;
            grid-template-columns: 2.5rem 1fr; 
            grid-template-rows: auto auto;
            gap: 0.25rem 0.75rem;
            padding: 0.875rem 1rem;
        }

        .row-rank { grid-column: 1; grid-row: 1 / 3; display: flex; align-items: center; justify-content: center; }
        .row-name { grid-column: 2; grid-row: 1; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; min-width: 0; }
        .row-progress { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; gap: 0.25rem; }

        @media (min-width: 768px) {
            .leaderboard-row { display: flex; flex-direction: row; align-items: center; gap: 1rem; padding: 0.875rem 1.25rem; }
            .row-rank { width: 2.5rem; flex-shrink: 0; }
            .row-name { width: 200px; flex-shrink: 0; justify-content: flex-start; }
            .row-progress { flex: 1; flex-direction: column; gap: 0.25rem; }
            .row-amount { flex-shrink: 0; text-align: right; width: 7rem; }
            .row-amount-mobile { display: none !important; }
        }

        @media (max-width: 767px) { .row-amount { display: none !important; } }

        /* ── Transiciones de vistas ── */
        .view-section { transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; }
        .view-hidden { opacity: 0; pointer-events: none; position: absolute; visibility: hidden; transform: translateY(10px); }
        .view-active { opacity: 1; pointer-events: auto; position: relative; visibility: visible; transform: translateY(0); }

        /* ── NUEVA ESTRUCTURA: MATRIZ CONTINUA TIPO TABLA ── */
        .matrix-grid-layout {
            display: grid;
            align-items: stretch;
            /* El gap fue removido para que las celdas se toquen y formen una tabla real */
        }
        
        .sticky-col-racha { 
            position: sticky; left: 0; z-index: 10; 
            background-color: #0f172a; /* Fondo sólido para evitar transparencias al hacer scroll */
        }
        .sticky-col-nombre { 
            position: sticky; left: 4.5rem; z-index: 10; 
            background-color: #0f172a; 
        }
        
        /* Efecto de sombra dinámica solo en la columna Nombre al hacer scroll */
        .sticky-col-nombre::after {
            content: ''; position: absolute; top: 0; right: -15px; width: 15px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.5), transparent); pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .is-scrolled .sticky-col-nombre::after { opacity: 1; }

        .matrix-row-hover {
            background-color: rgba(15, 23, 42, 0.4);
        }
        
        /* Unifica el color de la fila al pasar el ratón, incluyendo las columnas sticky */
        .matrix-row-hover:hover,
        .matrix-row-hover:hover .sticky-col-racha, 
        .matrix-row-hover:hover .sticky-col-nombre {
            background-color: #1e293b; 
        }

    </style>
</head>
<body class="bg-dark-bg text-slate-200 min-h-screen flex flex-col antialiased selection:bg-brand-glow selection:text-white relative overflow-x-hidden">

    <script>
        // ── CONFIGURACIÓN DE URLS ──
        const sheetId = '1URae8fWw5QuOLo7FdsQr2KP-OqY69GT6Xu9CFHsowXY'; 
        const currentDataUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
        const historicalDataUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=2095726805`;

        const leaderboardContainer = document.getElementById('leaderboard-container');
        const matrixContainer = document.getElementById('matrix-container');
        const matrixHeader = document.getElementById('matrix-header');
        const matrixScrollWrapper = document.getElementById('matrix-scroll-wrapper');
        const matrixScrollInner = document.getElementById('matrix-scroll-inner');
        const loadingState = document.getElementById('loading-state');
        const currentMonthElement = document.getElementById('current-month');
        
        const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        const fullMonthNames = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

        const currencyFormatter = new Intl.NumberFormat('en-US', {
            style: 'currency', currency: 'USD', maximumFractionDigits: 0
        });

        // ── ESTADO GLOBAL Y PREDICCIÓN ──
        let globalProcessedData = [];
        let isPredicting = false;

        function togglePrediction() {
            if(globalProcessedData.length === 0) return;
            
            isPredicting = !isPredicting;
            const btnText = document.getElementById('predict-text');
            const btn = document.getElementById('btn-predict');
            
            if (isPredicting) {
                btnText.innerText = "Ocultar Predicción";
                btn.classList.replace('bg-slate-800/50', 'bg-purple-600/20');
                btn.classList.replace('border-slate-700', 'border-purple-500/50');
                btn.classList.add('shadow-[0_0_25px_rgba(147,51,234,0.3)]');
            } else {
                btnText.innerText = "Predecir Futuro";
                btn.classList.replace('bg-purple-600/20', 'bg-slate-800/50');
                btn.classList.replace('border-purple-500/50', 'border-slate-700');
                btn.classList.remove('shadow-[0_0_25px_rgba(147,51,234,0.3)]');
            }
            
            renderHistoricalMatrix(globalProcessedData);
        }

        // ── UTILIDADES ──
        function formatMonthName(str) {
            if(!str) return "";
            let replaced = str.replace('-', ' ');
            return replaced.replace(/\b\w/g, l => l.toUpperCase());
        }

        function handleMatrixScroll() {
            if (matrixScrollWrapper.scrollLeft > 5) {
                matrixScrollWrapper.classList.add('is-scrolled');
            } else {
                matrixScrollWrapper.classList.remove('is-scrolled');
            }
        }

        // ── TABS MEJORADOS ──
        function switchView(viewName) {
            const currentView = document.getElementById('view-current');
            const histView = document.getElementById('view-historical');
            const btnCurrent = document.getElementById('btn-view-current');
            const btnHist = document.getElementById('btn-view-historical');

            const activeClass = "flex items-center gap-2 px-5 py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-brand-glow text-white shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all duration-300 flex-shrink-0";
            const inactiveClass = "flex items-center gap-2 px-5 py-2.5 text-xs sm:text-sm font-bold rounded-lg text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all duration-300 flex-shrink-0";

            if (viewName === 'current') {
                histView.classList.replace('view-active', 'view-hidden');
                setTimeout(() => currentView.classList.replace('view-hidden', 'view-active'), 50);
                
                btnCurrent.className = activeClass;
                btnHist.className = inactiveClass;
            } else {
                currentView.classList.replace('view-active', 'view-hidden');
                setTimeout(() => histView.classList.replace('view-hidden', 'view-active'), 50);
                
                btnHist.className = activeClass;
                btnCurrent.className = inactiveClass;
            }
        }

        // Animación suave del acordeón
        function toggleAccordion(id) {
            const content = document.getElementById(`acc-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                requestAnimationFrame(() => {
                    content.classList.add('animate-fade-in-up');
                });
                chevron.classList.add('rotate-180');
                chevron.classList.replace('text-slate-500', 'text-brand-glow');
            } else {
                content.classList.add('hidden');
                content.classList.remove('animate-fade-in-up');
                chevron.classList.remove('rotate-180');
                chevron.classList.replace('text-brand-glow', 'text-slate-500');
            }
        }

        function updateCurrentMonth() {
            currentMonthElement.textContent = meses[new Date().getMonth()];
        }

        function parseNumber(val) {
            if (!val) return 0;
            let cleaned = String(val).replace(/[$€A-Za-z\s]/g, '').replace(/,/g, '');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        }
        
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                const values = lines[i].split(regex);
                const rowObject = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = values[j] ? values[j].trim().replace(/"/g, '') : '';
                    rowObject[headers[j]] = val;
                }
                data.push(rowObject);
            }
            return data;
        }

        // ── EXTRACCIÓN A PRUEBA DE FALLOS ──
        async function fetchData() {
            setLoading(true);
            try {
                let currentCsvData = "";
                let historicalCsvData = "";

                try {
                    const currentResponse = await fetch(currentDataUrl);
                    if (!currentResponse.ok) throw new Error(`HTTP ${currentResponse.status}`);
                    currentCsvData = await currentResponse.text();
                    if (currentCsvData.trim().startsWith('<!DOCTYPE html>')) throw new Error("Documento no publicado como CSV.");
                } catch (err) {
                    throw new Error("No pudimos conectar con los datos del mes actual. Revisa el enlace: " + err.message);
                }

                try {
                    const historicalResponse = await fetch(historicalDataUrl);
                    if (historicalResponse.ok) {
                        const textData = await historicalResponse.text();
                        if (!textData.trim().startsWith('<!DOCTYPE html>')) {
                            historicalCsvData = textData;
                        }
                    }
                } catch (err) {
                    console.warn("No se pudo obtener el histórico. Se ignorará esta vista temporalmente.", err);
                }

                const currentRaw = parseCSV(currentCsvData);
                const historicalRaw = historicalCsvData ? parseCSV(historicalCsvData) : [];
                
                processAndRenderData(currentRaw, historicalRaw);

            } catch (error) {
                console.error("Error General:", error);
                leaderboardContainer.innerHTML = `
                    <div class="py-12 flex flex-col items-center justify-center text-rose-400 px-4 text-center">
                        <i class="ph-fill ph-warning-octagon text-6xl mb-4 opacity-80 shadow-rose-500/20 drop-shadow-xl"></i>
                        <p class="font-extrabold text-xl">Conexión Fallida</p>
                        <p class="text-sm mt-2 text-slate-400 max-w-md">${error.message}</p>
                    </div>`;
            } finally {
                setLoading(false);
            }
        }

        function processAndRenderData(currentData, historicalData) {
            const validCurrentData = currentData.filter(item => item.Nombre && item.Nombre.trim() !== '');
            
            const historyMap = {};
            const monthsSet = new Set();
            
            historicalData.forEach(row => {
                if (!row.Nombre || !row.Mes) return;
                const name = row.Nombre.trim();
                const month = row.Mes.trim().toLowerCase(); 
                const progreso = parseNumber(row.Progreso);
                const objetivo = parseNumber(row.Objetivo);
                
                if (!historyMap[name]) historyMap[name] = {};
                historyMap[name][month] = {
                    month: month, ventas: progreso, meta: objetivo,
                    percentage: objetivo > 0 ? (progreso / objetivo) * 100 : 0,
                    isOverGoal: progreso >= objetivo
                };
                monthsSet.add(month);
            });

            const parseMonthYear = (str) => {
                const parts = str.toLowerCase().split('-');
                if(parts.length !== 2) return new Date(0);
                const m = fullMonthNames.indexOf(parts[0]);
                const y = parseInt(parts[1]);
                return new Date(y, m, 1);
            };
            
            const sortedHistoricalMonths = Array.from(monthsSet).sort((a, b) => parseMonthYear(a) - parseMonthYear(b));
            
            const currentDate = new Date();
            const currentMonthName = fullMonthNames[currentDate.getMonth()] + '-' + currentDate.getFullYear();

            const processedData = validCurrentData.map((item, index) => {
                const nombre = item.Nombre.trim();
                const ventas = parseNumber(item.Progreso);
                const meta = parseNumber(item.Objetivo);
                let percentage = meta > 0 ? (ventas / meta) * 100 : 0;
                
                const history = [];
                const userHistory = historyMap[nombre] || {};
                
                sortedHistoricalMonths.forEach(m => {
                    if (userHistory[m]) history.push(userHistory[m]);
                    else history.push({ month: m, ventas: 0, meta: 0, percentage: 0, isOverGoal: false });
                });

                if (!sortedHistoricalMonths.includes(currentMonthName)) {
                     history.push({ month: currentMonthName, ventas: ventas, meta: meta, percentage: percentage, isOverGoal: ventas >= meta });
                }

                // ── LÓGICA DE RACHA (Ignorando el mes en curso estrictamente) ──
                let streak = 0;
                for(let i = history.length - 1; i >= 0; i--) {
                    if (history[i].month === currentMonthName) continue; // Ignoramos el mes actual

                    if(history[i].isOverGoal && history[i].ventas > 0) {
                        streak++;
                    } else {
                        break; // Se rompió la racha anterior
                    }
                }

                return { id: `user-${index}`, nombre, ventas, meta, percentage, history, streak };
            });

            processedData.sort((a, b) => b.percentage - a.percentage);
            
            globalProcessedData = processedData; // Guardamos global para la predicción
            updateStats(processedData);
            renderHistoricalMatrix(globalProcessedData);
            renderCurrentMonthView(processedData);
        }

        // ── RENDERIZADO: MES ACTUAL ──
        function renderCurrentMonthView(processedData) {
            leaderboardContainer.innerHTML = '';
            if (processedData.length === 0) return;

            processedData.forEach((person, index) => {
                const rank = index + 1;
                const isOverGoal = person.ventas >= person.meta;
                const visualPercentage = Math.min(person.percentage, 100);

                let barColorClass = "bg-brand-glow shadow-[0_0_10px_rgba(59,130,246,0.5)]";
                let textColorClass = "text-slate-300";
                let iconHtml = "";
                let nameClass = "text-white";

                if (isOverGoal) {
                    barColorClass = "bg-gradient-to-r from-emerald-400 to-green-300 shadow-[0_0_12px_rgba(52,211,153,0.6)]";
                    textColorClass = "text-emerald-400 font-bold drop-shadow-[0_0_8px_rgba(52,211,153,0.5)]";
                    nameClass = "text-emerald-50";
                    iconHtml = `<i class="ph-fill ph-check-circle text-emerald-400" title="¡Meta Alcanzada!"></i>`;
                } else if (person.percentage >= 80) {
                    barColorClass = "bg-gradient-to-r from-amber-400 to-yellow-300 shadow-[0_0_12px_rgba(251,191,36,0.5)]";
                } else if (person.percentage <= 30 && person.ventas > 0) {
                    barColorClass = "bg-gradient-to-r from-rose-500 to-red-400";
                }

                let rankClass = 'bg-slate-800/50 text-slate-400 border-slate-700/50';
                if (rank === 1) rankClass = 'bg-amber-500/20 text-amber-400 border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.2)]';
                else if (rank === 2) rankClass = 'bg-slate-300/20 text-slate-300 border-slate-400/50';
                else if (rank === 3) rankClass = 'bg-orange-600/20 text-orange-400 border-orange-600/50';

                const faltaMonto = person.ventas < person.meta ? `Falta ${currencyFormatter.format(person.meta - person.ventas)}` : '¡Objetivo superado!';

                // Tarjetas miniatura premium para el acordeón
                const historyCardsHtml = person.history.map(h => {
                    if (h.meta === 0 && h.ventas === 0) return '';
                    const isWin = h.isOverGoal;
                    const cardBg = isWin ? 'bg-emerald-900/10 border-emerald-500/20' : 'bg-slate-800/40 border-slate-700/50';
                    const numColor = isWin ? 'text-emerald-400' : 'text-white';
                    const pctBg = isWin ? 'bg-emerald-500/20 text-emerald-400' : (h.percentage >= 80 ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-700/50 text-slate-300');
                    const barIndicator = isWin ? 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]' : 'bg-brand-glow';

                    return `
                        <div class="flex-shrink-0 w-[140px] rounded-xl p-3 flex flex-col justify-between ${cardBg} border backdrop-blur-sm transition-transform hover:-translate-y-1 relative overflow-hidden">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[11px] font-bold text-slate-400 capitalize">${formatMonthName(h.month).split(' ')[0]}</span>
                                <span class="text-[9px] font-bold px-1.5 py-0.5 rounded-md ${pctBg}">${h.percentage.toFixed(0)}%</span>
                            </div>
                            <div class="font-extrabold ${numColor} text-sm mb-0.5">${currencyFormatter.format(h.ventas)}</div>
                            <div class="text-[9px] text-slate-500 font-medium flex items-center gap-1"><i class="ph-bold ph-target"></i> ${currencyFormatter.format(h.meta)}</div>
                            <div class="absolute bottom-0 left-0 h-[2px] w-full bg-slate-800"><div class="h-full ${barIndicator}" style="width: ${Math.min(h.percentage, 100)}%"></div></div>
                        </div>`;
                }).join('');

                const rowHtml = `
                <div class="leaderboard-item cursor-pointer group animate-fade-in-up" style="animation-delay: ${index * 40}ms" onclick="toggleAccordion('${person.id}')">
                    <div class="leaderboard-row transition-colors group-hover:bg-slate-800/30 rounded-t-xl rounded-b-xl group-hover:rounded-b-none">
                        <div class="row-rank">
                            <div class="flex items-center justify-center w-8 h-8 rounded-full ${rankClass} border font-bold text-sm flex-shrink-0">
                                ${rank}
                            </div>
                        </div>

                        <div class="row-name min-w-0">
                            <h3 class="text-sm sm:text-base font-bold ${nameClass} flex items-center gap-1.5 truncate tracking-tight">
                                <span class="truncate">${person.nombre}</span>
                                ${iconHtml}
                                ${person.streak >= 3 ? `<span class="flex items-center bg-orange-500/10 text-orange-400 px-1.5 py-0.5 rounded text-[10px] border border-orange-500/30 ml-1"><i class="ph-fill ph-fire mr-0.5"></i>x${person.streak}</span>` : ''}
                            </h3>
                            <div class="row-amount-mobile text-right flex-shrink-0 ml-2">
                                <div class="text-sm font-bold ${isOverGoal ? 'text-emerald-400' : 'text-white'} whitespace-nowrap">
                                    ${currencyFormatter.format(person.ventas)}
                                </div>
                            </div>
                        </div>

                        <div class="row-progress">
                            <div class="flex justify-between items-end mb-1.5">
                                <span class="text-xs font-bold ${textColorClass}">${person.percentage.toFixed(1)}%</span>
                                <span class="text-[10px] font-medium text-slate-500 hidden sm:inline flex items-center gap-1"><i class="ph-bold ph-target"></i> ${currencyFormatter.format(person.meta)}</span>
                            </div>
                            <div class="w-full bg-slate-900/80 rounded-full h-3 overflow-hidden border border-slate-700/40 shadow-inner">
                                <div class="progress-bar-fill h-full rounded-full ${barColorClass} relative" style="width: 0%;" data-width="${visualPercentage}%">
                                    ${isOverGoal ? '<div class="absolute inset-0 bg-white/20 animate-pulse-slow"></div>' : ''}
                                </div>
                            </div>
                        </div>

                        <div class="row-amount">
                            <div class="text-sm sm:text-lg font-extrabold ${isOverGoal ? 'text-emerald-400 drop-shadow-[0_0_5px_rgba(52,211,153,0.3)]' : 'text-white'}">
                                ${currencyFormatter.format(person.ventas)}
                            </div>
                            <div class="text-[10px] text-slate-400 font-medium uppercase tracking-wider">${faltaMonto}</div>
                        </div>
                        
                        <div class="ml-1 sm:ml-2 flex items-center justify-center text-slate-500 group-hover:text-brand-glow transition-colors">
                            <i class="ph-bold ph-caret-down text-lg sm:text-xl transition-transform duration-300" id="chevron-${person.id}"></i>
                        </div>
                    </div>

                    <div id="acc-${person.id}" class="hidden border-t border-slate-700/40 bg-slate-900/30 p-4 sm:p-5 rounded-b-xl cursor-default" onclick="event.stopPropagation()">
                        <h4 class="text-[10px] font-bold text-slate-400 mb-3 uppercase tracking-widest flex items-center gap-1.5">
                            <i class="ph-bold ph-clock-counter-clockwise"></i> Tendencia de los últimos meses
                        </h4>
                        <div class="flex gap-4 overflow-x-auto pb-2 snap-x custom-scrollbar">
                            ${historyCardsHtml || '<div class="w-full text-center py-4 text-xs text-slate-500 font-medium border border-dashed border-slate-700/50 rounded-lg">Sin historial disponible.</div>'}
                        </div>
                    </div>
                </div>`;
                leaderboardContainer.insertAdjacentHTML('beforeend', rowHtml);
            });

            requestAnimationFrame(() => {
                setTimeout(() => {
                    document.querySelectorAll('.progress-bar-fill').forEach(bar => { bar.style.width = bar.getAttribute('data-width'); });
                }, 100);
            });
        }

        // ── RENDERIZADO: MATRIZ HISTÓRICA (DISEÑO CONTINUO TIPO TABLA) ──
        function renderHistoricalMatrix(data) {
            if(data.length === 0) return;
            
            let matrixData = JSON.parse(JSON.stringify(data));
            
            // ── LÓGICA DE PREDICCIÓN (Ventas a 0, Meta multiplicada) ──
            if (isPredicting) {
                const currentMonthIdx = new Date().getMonth();
                const currentYear = new Date().getFullYear();
                
                matrixData.forEach(person => {
                    const baseData = person.history[person.history.length - 1]; // Toma el mes actual como base
                    let baseMeta = baseData.meta > 0 ? baseData.meta : 1000;
                    
                    for (let i = currentMonthIdx + 1; i <= 11; i++) {
                        const multiplier = (i - currentMonthIdx) + 1;
                        const predictedMeta = baseMeta * multiplier; // Multiplica la meta 
                        const predictedVentas = 0; // Lo alcanzado se queda en cero
                        
                        person.history.push({
                            month: `${fullMonthNames[i]}-${currentYear}`,
                            ventas: predictedVentas,
                            meta: predictedMeta,
                            percentage: 0,
                            isOverGoal: false,
                            isPrediction: true 
                        });
                    }
                });
            }

            const historyMonths = matrixData[0].history.map(h => h.month);
            const colsCount = historyMonths.length;
            
            // Grid de tabla continua sin espacios huecos
            const gridStyle = `grid-template-columns: 4.5rem 180px repeat(${colsCount}, minmax(130px, 1fr));`;
            const calculatedMinWidth = 280 + (colsCount * 130);
            matrixScrollInner.style.minWidth = `${calculatedMinWidth}px`;

            let headerHtml = `
                <div class="sticky-col-racha flex items-center justify-center p-3 border-r border-slate-700/60" title="Meses consecutivos pasados logrando meta">Racha</div>
                <div class="sticky-col-nombre flex items-center p-3 border-r border-slate-700/60">Nombre del Asesor</div>
            `;
            
            historyMonths.forEach((month, idx) => {
                const isPredictionCol = matrixData[0].history[idx].isPrediction;
                const isCurrent = !isPredictionCol && idx === (historyMonths.length - (isPredicting ? (11 - new Date().getMonth() + 1) : 1));
                const monthMeta = Math.max(...matrixData.map(p => p.history[idx].meta));
                
                let titleColor = 'text-slate-300';
                if (isCurrent) titleColor = 'text-brand-glow drop-shadow-[0_0_5px_rgba(59,130,246,0.4)]';
                if (isPredictionCol) titleColor = 'text-purple-400 drop-shadow-[0_0_5px_rgba(147,51,234,0.4)]';

                headerHtml += `
                    <div class="flex flex-col items-center justify-center text-center py-2 px-3 border-r border-slate-700/60 last:border-0">
                        <span class="${titleColor} font-bold text-xs sm:text-sm flex items-center gap-1.5">
                            ${isPredictionCol ? '<i class="ph-fill ph-magic-wand text-xs"></i>' : ''}
                            ${formatMonthName(month)}
                        </span>
                        ${monthMeta > 0 ? `
                        <div class="mt-2 flex items-center gap-1.5 px-2.5 py-0.5 rounded-md bg-slate-800/80 border border-slate-700/60 shadow-inner">
                            <i class="ph-bold ph-target text-brand-glow text-[11px]"></i>
                            <span class="text-[10px] text-slate-200 font-bold tracking-wide">META: ${currencyFormatter.format(monthMeta)}</span>
                        </div>` : ''}
                    </div>`;
            });
            
            matrixHeader.style = gridStyle;
            matrixHeader.innerHTML = headerHtml;

            matrixData.sort((a, b) => b.streak !== a.streak ? b.streak - a.streak : b.percentage - a.percentage);
            matrixContainer.innerHTML = '';
            
            matrixData.forEach((person, index) => {
                let streakBadge = `<span class="text-xs text-slate-600 font-bold">-</span>`;
                if (person.streak >= 6) streakBadge = `<span class="px-2.5 py-1 rounded-full bg-gradient-to-r from-orange-500 to-amber-500 text-white text-[11px] font-bold shadow-[0_0_8px_rgba(249,115,22,0.4)]">🏆 x${person.streak}</span>`;
                else if (person.streak >= 3) streakBadge = `<span class="px-2.5 py-1 rounded bg-orange-500/10 text-orange-400 text-[11px] font-bold border border-orange-500/30">🔥 x${person.streak}</span>`;
                else if (person.streak > 0) streakBadge = `<span class="text-sm text-slate-400 font-bold">x${person.streak}</span>`;

                let monthsHtml = '';
                person.history.forEach((hist) => {
                    
                    let moneyColor = 'text-white';
                    let pctBg = 'bg-slate-700/60 text-slate-300';
                    let iconHtml = '';
                    let barIndicator = 'bg-brand-glow';
                    let progressWidth = Math.min(hist.percentage, 100);

                    // Si no hay datos (y no es predicción), mostramos vacío
                    if (hist.meta === 0 && hist.ventas === 0 && !hist.isPrediction) {
                        monthsHtml += `
                        <div class="flex items-center justify-center p-3 border-r border-slate-700/30 last:border-0 relative">
                            <span class="text-[10px] font-medium text-slate-600 border border-dashed border-slate-700/50 px-3 py-1 rounded-lg">Sin datos</span>
                        </div>`;
                        return;
                    }

                    if (hist.isPrediction) {
                        moneyColor = 'text-purple-400 drop-shadow-[0_0_5px_rgba(147,51,234,0.2)]';
                        pctBg = 'bg-purple-500/10 text-purple-400 border border-purple-500/20';
                        iconHtml = '<i class="ph-fill ph-magic-wand text-purple-400 mr-1.5 text-xs"></i>';
                        barIndicator = 'bg-purple-400 shadow-[0_0_8px_rgba(147,51,234,0.8)]';
                    }
                    else if (hist.isOverGoal && hist.ventas > 0) {
                        moneyColor = 'text-emerald-400 drop-shadow-[0_0_5px_rgba(52,211,153,0.2)]';
                        pctBg = 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/20';
                        iconHtml = '<i class="ph-fill ph-check-circle text-emerald-400 mr-1.5 text-xs"></i>';
                        barIndicator = 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]';
                    } else if (hist.percentage >= 80) {
                        moneyColor = 'text-amber-400';
                        pctBg = 'bg-amber-500/20 text-amber-400';
                        barIndicator = 'bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.5)]';
                    } else if (hist.ventas > 0) {
                        pctBg = 'bg-rose-500/10 text-rose-400';
                        barIndicator = 'bg-rose-400';
                    }

                    monthsHtml += `
                        <div class="flex flex-col items-center justify-center p-3 border-r border-slate-700/30 last:border-0 relative group">
                            <div class="font-extrabold ${moneyColor} text-[13px] sm:text-sm mb-1.5 flex items-center">
                                ${iconHtml}${hist.ventas > 0 || hist.isPrediction ? currencyFormatter.format(hist.ventas) : (hist.meta === 0 ? '-' : '$0')}
                            </div>
                            <div class="text-[10px] font-bold px-2 py-0.5 rounded-md ${pctBg}">
                                ${hist.percentage.toFixed(0)}%
                            </div>
                            <div class="absolute bottom-0 left-0 w-full h-[2px] bg-transparent group-hover:bg-slate-700/50 transition-colors">
                                <div class="h-full ${barIndicator} transition-all duration-1000 ease-out" style="width: ${progressWidth}%"></div>
                            </div>
                        </div>`;
                });

                const rowHtml = `
                    <div class="matrix-grid-layout matrix-row-hover border-b border-slate-700/30 transition-colors animate-fade-in-up" style="${gridStyle}; animation-delay: ${index * 40}ms">
                        <div class="sticky-col-racha flex justify-center items-center p-3 border-r border-slate-700/50">${streakBadge}</div>
                        <div class="sticky-col-nombre font-bold text-slate-200 text-[13px] sm:text-sm truncate p-3 border-r border-slate-700/50">${person.nombre}</div>
                        ${monthsHtml}
                    </div>
                `;
                matrixContainer.insertAdjacentHTML('beforeend', rowHtml);
            });
            handleMatrixScroll();
        }

        function updateStats(data) {
            document.getElementById('stat-total-team').innerText = data.length;
            document.getElementById('stat-achievers').innerText = data.filter(p => p.ventas >= p.meta).length;
            document.getElementById('stat-total-money').innerText = currencyFormatter.format(data.reduce((s, p) => s + p.ventas, 0));
        }

        function setLoading(isLoading) {
            loadingState.style.display = isLoading ? 'flex' : 'none';
        }

        window.onload = () => {
            updateCurrentMonth();
            fetchData();
        };
    </script>
</body>
</html>
