<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Metas con Histórico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155'
                        },
                        brand: {
                            glow: '#3b82f6'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }

        .progress-bar-fill {
            transition: width 1.5s ease-out, background-color 0.5s ease;
        }

        /* Scrollbars personalizados */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .glass-header {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ── RESPONSIVE: Estructura del item del leaderboard ── */
        .leaderboard-item {
            background: rgba(15,23,42,0.5);
            border: 1px solid rgba(51,65,85,0.4);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        
        .leaderboard-item:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: #475569;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }

        .leaderboard-row {
            display: grid;
            grid-template-columns: 2.5rem 1fr; 
            grid-template-rows: auto auto;
            gap: 0.25rem 0.75rem;
            padding: 0.875rem 1rem;
        }

        .row-rank {
            grid-column: 1;
            grid-row: 1 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-name {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            min-width: 0;
        }

        .row-progress {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        /* Desktop layout */
        @media (min-width: 768px) {
            .leaderboard-row {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 1rem;
                padding: 0.875rem 1.25rem;
            }
            .row-rank   { width: 2.5rem; flex-shrink: 0; }
            .row-name   { width: 200px; flex-shrink: 0; justify-content: flex-start; }
            .row-progress { flex: 1; flex-direction: column; gap: 0.25rem; }
            .row-amount { flex-shrink: 0; text-align: right; width: 7rem; }
            .row-amount-mobile { display: none !important; }
        }

        @media (max-width: 767px) {
            .row-amount { display: none !important; }
        }

        .header-title { font-size: clamp(0.95rem, 3vw, 1.25rem); }
        
        /* Transiciones de vistas */
        .view-section {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }
        .view-hidden {
            opacity: 0;
            pointer-events: none;
            position: absolute;
            visibility: hidden;
            transform: translateY(10px);
        }
        .view-active {
            opacity: 1;
            pointer-events: auto;
            position: relative;
            visibility: visible;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-dark-bg text-slate-200 min-h-screen flex flex-col antialiased selection:bg-brand-glow selection:text-white relative overflow-x-hidden">

    <!-- Glow background -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-emerald-600/20 blur-[120px] pointer-events-none z-0"></div>

    <header class="glass-header sticky top-0 z-50 w-full px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <!-- Logo y Título -->
        <div class="flex items-center gap-2 sm:gap-3 min-w-0">
            <div class="w-9 h-9 sm:w-10 sm:h-10 flex-shrink-0 rounded-xl bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <i class="ph-fill ph-trophy text-white text-xl sm:text-2xl"></i>
            </div>
            <div class="min-w-0">
                <h1 class="header-title font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400 truncate">
                    Metas del Equipo
                </h1>
                <p class="text-[10px] sm:text-xs text-slate-400 font-medium tracking-wider uppercase">
                    Métricas <span id="current-month" class="text-emerald-400 font-bold">...</span>
                </p>
            </div>
        </div>
        
        <!-- Controles y Toggle de Vistas -->
        <div class="flex items-center gap-3 sm:gap-4 flex-shrink-0">
            
            <!-- Toggle Switch (Mes Actual vs Histórico) -->
            <div class="flex p-1 bg-dark-bg/80 border border-dark-border rounded-lg shadow-inner">
                <button id="btn-view-current" onclick="switchView('current')" class="px-3 py-1.5 text-xs sm:text-sm font-semibold rounded-md bg-brand-glow/20 text-brand-glow transition-all">
                    Mes Actual
                </button>
                <button id="btn-view-historical" onclick="switchView('historical')" class="px-3 py-1.5 text-xs sm:text-sm font-semibold rounded-md text-slate-400 hover:text-white transition-all">
                    Vista Histórica
                </button>
            </div>

            <!-- Botón Actualizar -->
            <button onclick="fetchData()" class="p-2 rounded-lg bg-dark-card border border-dark-border hover:bg-slate-700 hover:text-white transition-colors group" title="Actualizar datos">
                <i class="ph ph-arrows-clockwise text-lg sm:text-xl group-hover:rotate-180 transition-transform duration-500"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 w-full max-w-5xl mx-auto px-3 sm:px-4 py-5 sm:py-8 relative z-10">
        
        <!-- ========================================== -->
        <!-- VISTA 1: MES ACTUAL                        -->
        <!-- ========================================== -->
        <div id="view-current" class="view-section view-active">
            <!-- Stats cards -->
            <div class="grid grid-cols-3 gap-2 sm:gap-4 mb-5 sm:mb-8">
                <div class="bg-dark-card/80 border border-dark-border rounded-xl sm:rounded-2xl p-3 sm:p-5 backdrop-blur-sm">
                    <p class="text-slate-400 text-[10px] sm:text-sm font-medium mb-1 flex items-center gap-1">
                        <i class="ph ph-users text-sm sm:text-base"></i>
                        <span class="hidden sm:inline">Equipo Total</span>
                        <span class="sm:hidden">Equipo</span>
                    </p>
                    <h2 id="stat-total-team" class="text-2xl sm:text-3xl font-bold text-white">0</h2>
                </div>
                <div class="bg-dark-card/80 border border-dark-border rounded-xl sm:rounded-2xl p-3 sm:p-5 backdrop-blur-sm relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 w-16 h-16 sm:w-20 sm:h-20 bg-emerald-500/10 rounded-full blur-xl"></div>
                    <p class="text-slate-400 text-[10px] sm:text-sm font-medium mb-1 flex items-center gap-1">
                        <i class="ph ph-trend-up text-emerald-400 text-sm sm:text-base"></i>
                        <span class="hidden sm:inline">Superaron la Meta</span>
                        <span class="sm:hidden">Superaron</span>
                    </p>
                    <h2 id="stat-achievers" class="text-2xl sm:text-3xl font-bold text-emerald-400">0</h2>
                </div>
                <div class="bg-dark-card/80 border border-dark-border rounded-xl sm:rounded-2xl p-3 sm:p-5 backdrop-blur-sm">
                    <p class="text-slate-400 text-[10px] sm:text-sm font-medium mb-1 flex items-center gap-1">
                        <i class="ph ph-currency-dollar text-sm sm:text-base"></i>
                        <span class="hidden sm:inline">Total Generado</span>
                        <span class="sm:hidden">Total</span>
                    </p>
                    <h2 id="stat-total-money" class="text-lg sm:text-3xl font-bold text-white">$0</h2>
                </div>
            </div>

            <!-- Leaderboard -->
            <div class="bg-dark-card/50 border border-dark-border rounded-xl sm:rounded-2xl p-1 backdrop-blur-sm shadow-2xl">
                <!-- Encabezados solo desktop -->
                <div class="hidden md:flex items-center gap-4 px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-dark-border/50">
                    <div class="w-10 text-center flex-shrink-0">Pos.</div>
                    <div style="width:200px" class="flex-shrink-0">Nombre</div>
                    <div class="flex-1">Progreso</div>
                    <div class="w-28 text-right flex-shrink-0">Alcanzado</div>
                    <div class="w-8 flex-shrink-0"></div> <!-- Espacio para flecha acordeón -->
                </div>

                <div id="leaderboard-container" class="flex flex-col gap-1 p-1.5 sm:p-2">
                    <div id="loading-state" class="py-12 flex flex-col items-center justify-center text-slate-500">
                        <i class="ph ph-spinner-gap animate-spin text-4xl mb-3 text-brand-glow"></i>
                        <p class="text-sm">Obteniendo datos de la nube...</p>
                    </div>
                </div>
            </div>
        </div>


        <!-- ========================================== -->
        <!-- VISTA 2: HISTÓRICA INDIVIDUAL              -->
        <!-- ========================================== -->
        <div id="view-historical" class="view-section view-hidden">
            
            <!-- Matriz de Cumplimiento por Persona (Foco Individual) -->
            <div class="bg-dark-card/50 border border-dark-border rounded-xl sm:rounded-2xl backdrop-blur-sm shadow-2xl overflow-hidden">
                <div class="px-5 py-4 border-b border-dark-border/50 bg-slate-900/30">
                    <h3 class="text-sm sm:text-base font-bold text-white flex items-center gap-2">
                        <i class="ph-fill ph-calendar-check text-emerald-400"></i>
                        Matriz de Consistencia Individual
                    </h3>
                    <p class="text-xs text-slate-400 mt-1">Monitorea el progreso, porcentaje y meta alcanzada mes a mes por cada integrante.</p>
                </div>
                
                <!-- Contenedor con scroll horizontal para la tabla detallada -->
                <div class="w-full overflow-x-auto pb-2">
                    <div class="min-w-[950px]">
                        <!-- Encabezado de la Matriz -->
                        <div id="matrix-header" class="grid grid-cols-[4rem_160px_repeat(6,minmax(120px,1fr))] gap-4 px-4 py-3 bg-slate-900/50 text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-dark-border/50">
                            <!-- Los meses se inyectan aquí -->
                        </div>
                        
                        <!-- Filas de la Matriz -->
                        <div id="matrix-container" class="flex flex-col text-sm">
                            <!-- Filas generadas por JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const sheetId = '1URae8fWw5QuOLo7FdsQr2KP-OqY69GT6Xu9CFHsowXY'; 
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

        const leaderboardContainer = document.getElementById('leaderboard-container');
        const matrixContainer = document.getElementById('matrix-container');
        const matrixHeader = document.getElementById('matrix-header');
        const loadingState = document.getElementById('loading-state');
        const currentMonthElement = document.getElementById('current-month');
        
        const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

        const currencyFormatter = new Intl.NumberFormat('en-US', {
            style: 'currency', currency: 'USD', maximumFractionDigits: 0
        });

        // ── Lógica de Cambio de Vista (Tabs) ──
        function switchView(viewName) {
            const currentView = document.getElementById('view-current');
            const histView = document.getElementById('view-historical');
            const btnCurrent = document.getElementById('btn-view-current');
            const btnHist = document.getElementById('btn-view-historical');

            if (viewName === 'current') {
                histView.classList.replace('view-active', 'view-hidden');
                setTimeout(() => currentView.classList.replace('view-hidden', 'view-active'), 50);
                
                btnCurrent.classList.replace('text-slate-400', 'text-brand-glow');
                btnCurrent.classList.add('bg-brand-glow/20');
                btnHist.classList.remove('text-brand-glow', 'bg-brand-glow/20');
                btnHist.classList.add('text-slate-400');
            } else {
                currentView.classList.replace('view-active', 'view-hidden');
                setTimeout(() => histView.classList.replace('view-hidden', 'view-active'), 50);
                
                btnHist.classList.replace('text-slate-400', 'text-brand-glow');
                btnHist.classList.add('bg-brand-glow/20');
                btnCurrent.classList.remove('text-brand-glow', 'bg-brand-glow/20');
                btnCurrent.classList.add('text-slate-400');
            }
        }

        // ── Lógica Acordeón Desplegable ──
        function toggleAccordion(id) {
            const content = document.getElementById(`acc-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                chevron.classList.add('rotate-180');
                chevron.classList.replace('text-slate-500', 'text-brand-glow');
            } else {
                content.classList.add('hidden');
                chevron.classList.remove('rotate-180');
                chevron.classList.replace('text-brand-glow', 'text-slate-500');
            }
        }

        function updateCurrentMonth() {
            currentMonthElement.textContent = meses[new Date().getMonth()];
        }

        function parseNumber(val) {
            if (!val) return 0;
            let cleaned = String(val).replace(/[$€A-Za-z\s]/g, '').replace(/,/g, '');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        }
        
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                const values = lines[i].split(regex);
                const rowObject = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = values[j] ? values[j].trim().replace(/"/g, '') : '';
                    rowObject[headers[j]] = val;
                }
                data.push(rowObject);
            }
            return data;
        }

        // Generar Histórico de prueba de los últimos 6 meses
        function generateMockHistory(currentMeta, currentVentas) {
            const currentMonthIndex = new Date().getMonth();
            const history = [];
            
            for (let i = 5; i >= 1; i--) {
                let pastMonthIndex = currentMonthIndex - i;
                if (pastMonthIndex < 0) pastMonthIndex += 12; 
                
                const randomFactor = 0.5 + (Math.random() * 0.7); 
                const pastVentas = Math.round(currentMeta * randomFactor);
                
                history.push({
                    month: meses[pastMonthIndex],
                    ventas: pastVentas,
                    meta: currentMeta,
                    percentage: (pastVentas / currentMeta) * 100,
                    isOverGoal: pastVentas >= currentMeta
                });
            }
            
            // Mes actual real
            history.push({
                month: meses[currentMonthIndex],
                ventas: currentVentas,
                meta: currentMeta,
                percentage: currentMeta > 0 ? (currentVentas / currentMeta) * 100 : 0,
                isOverGoal: currentVentas >= currentMeta
            });
            
            return history; 
        }

        async function fetchData() {
            setLoading(true);
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                const csvData = await response.text();
                if (csvData.trim().startsWith('<!DOCTYPE html>')) {
                    throw new Error("La hoja no está publicada como CSV.");
                }
                const rawData = parseCSV(csvData);
                processAndRenderData(rawData);
            } catch (error) {
                console.error("Error:", error);
                leaderboardContainer.innerHTML = `
                    <div class="py-12 flex flex-col items-center justify-center text-red-400 px-4">
                        <i class="ph ph-warning-circle text-4xl mb-3"></i>
                        <p class="font-medium text-center">No se pudo cargar los datos.</p>
                        <p class="text-sm mt-2 opacity-70 max-w-md text-center">${error.message}</p>
                    </div>`;
            } finally {
                setLoading(false);
            }
        }

        function processAndRenderData(data) {
            const validData = data.filter(item => item.Nombre && item.Nombre.trim() !== '');
            const processedData = validData.map((item, index) => {
                const nombre = item.Nombre || "Desconocido";
                const ventas = parseNumber(item.Progreso);
                const meta = parseNumber(item.Objetivo);
                let percentage = meta > 0 ? (ventas / meta) * 100 : 0;
                
                const history = generateMockHistory(meta || 1000, ventas);

                let streak = 0;
                for(let i = history.length - 1; i >= 0; i--) {
                    if(history[i].isOverGoal) streak++;
                    else break;
                }

                return { id: `user-${index}`, nombre, ventas, meta, percentage, history, streak };
            });

            // Ordenar por cumplimiento actual
            processedData.sort((a, b) => b.percentage - a.percentage);
            
            updateStats(processedData);
            renderHistoricalMatrix(processedData);

            leaderboardContainer.innerHTML = '';

            if (processedData.length === 0) {
                leaderboardContainer.innerHTML = `
                    <div class="py-12 flex flex-col items-center text-slate-500">
                        <i class="ph ph-empty text-4xl mb-3"></i>
                        <p>No hay datos disponibles.</p>
                    </div>`;
                return;
            }

            // ── RENDERIZAR VISTA MES ACTUAL (CON ACORDEÓN) ──
            processedData.forEach((person, index) => {
                const rank = index + 1;
                const isOverGoal = person.ventas >= person.meta;
                const visualPercentage = Math.min(person.percentage, 100);

                let barColorClass = "bg-blue-500";
                let textColorClass = "text-slate-300";
                let iconHtml = "";
                let nameClass = "text-white";

                if (isOverGoal) {
                    barColorClass = "bg-gradient-to-r from-emerald-500 to-green-400";
                    textColorClass = "text-emerald-400 font-bold drop-shadow-[0_0_8px_rgba(52,211,153,0.5)]";
                    nameClass = "text-emerald-50";
                    iconHtml = `<i class="ph-fill ph-check-circle text-emerald-400" title="¡Meta Alcanzada!"></i>`;
                } else if (person.percentage >= 80) {
                    barColorClass = "bg-gradient-to-r from-yellow-500 to-amber-400";
                } else if (person.percentage <= 30) {
                    barColorClass = "bg-gradient-to-r from-rose-500 to-red-400";
                }

                let rankClass = 'bg-slate-800 text-slate-400 border-dark-border';
                if (rank === 1) rankClass = 'bg-amber-500/20 text-amber-400 border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.2)]';
                else if (rank === 2) rankClass = 'bg-slate-300/20 text-slate-300 border-slate-400/50';
                else if (rank === 3) rankClass = 'bg-orange-600/20 text-orange-400 border-orange-600/50';

                const faltaMonto = person.ventas < person.meta
                    ? `falta ${currencyFormatter.format(person.meta - person.ventas)}`
                    : '✓ meta cumplida';

                // Generar tarjetas miniatura del acordeón histórico
                const historyCardsHtml = person.history.map(h => {
                    const cardColor = h.isOverGoal ? 'text-emerald-400' : 'text-slate-200';
                    const miniBarColor = h.isOverGoal ? 'bg-emerald-400' : (h.percentage >= 80 ? 'bg-amber-400' : 'bg-brand-glow');
                    return `
                        <div class="flex-shrink-0 w-[140px] bg-dark-bg border border-dark-border rounded-lg p-3 snap-center shadow-inner">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-bold text-slate-400">${h.month}</span>
                                <span class="text-[10px] font-bold ${cardColor}">${h.percentage.toFixed(0)}%</span>
                            </div>
                            <div class="font-bold ${cardColor} text-sm mb-1">${currencyFormatter.format(h.ventas)}</div>
                            <div class="text-[10px] text-slate-500 mb-2">Meta: ${currencyFormatter.format(h.meta)}</div>
                            <div class="w-full bg-slate-800 rounded-full h-1">
                                 <div class="${miniBarColor} h-1 rounded-full" style="width: ${Math.min(h.percentage, 100)}%"></div>
                            </div>
                        </div>`;
                }).join('');

                const rowHtml = `
                <div class="leaderboard-item cursor-pointer group" onclick="toggleAccordion('${person.id}')">
                    <div class="leaderboard-row transition-colors group-hover:bg-slate-800/50">
                        <div class="row-rank">
                            <div class="flex items-center justify-center w-8 h-8 rounded-full ${rankClass} border font-bold text-sm flex-shrink-0">
                                ${rank}
                            </div>
                        </div>

                        <div class="row-name min-w-0">
                            <h3 class="text-sm sm:text-base font-semibold ${nameClass} flex items-center gap-1.5 truncate">
                                <span class="truncate">${person.nombre}</span>
                                ${iconHtml}
                                ${person.streak >= 3 ? `<i class="ph-fill ph-fire text-orange-500 text-sm" title="¡Racha de ${person.streak} meses!"></i>` : ''}
                            </h3>
                            <div class="row-amount-mobile text-right flex-shrink-0 ml-2">
                                <div class="text-sm font-bold ${isOverGoal ? 'text-emerald-400' : 'text-white'} whitespace-nowrap">
                                    ${currencyFormatter.format(person.ventas)}
                                </div>
                                <div class="text-[10px] text-slate-500 whitespace-nowrap">${faltaMonto}</div>
                            </div>
                        </div>

                        <div class="row-progress">
                            <div class="flex justify-between items-end">
                                <span class="text-xs font-bold ${textColorClass}">
                                    ${person.percentage.toFixed(1)}%
                                </span>
                                <span class="text-[10px] text-slate-500 hidden sm:inline">
                                    Meta: ${currencyFormatter.format(person.meta)}
                                </span>
                            </div>
                            <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden border border-slate-700/50 relative">
                                <div class="progress-bar-fill h-full rounded-full ${barColorClass} relative"
                                     style="width: 0%;"
                                     data-width="${visualPercentage}%">
                                    ${isOverGoal ? '<div class="absolute inset-0 bg-white/20 animate-pulse-slow"></div>' : ''}
                                </div>
                            </div>
                        </div>

                        <div class="row-amount">
                            <div class="font-bold ${isOverGoal ? 'text-emerald-400' : 'text-white'}">
                                ${currencyFormatter.format(person.ventas)}
                            </div>
                            <div class="text-[10px] text-slate-500">${faltaMonto}</div>
                        </div>
                        
                        <!-- Flecha Desplegable -->
                        <div class="ml-1 sm:ml-2 flex items-center justify-center text-slate-500 group-hover:text-brand-glow transition-colors">
                            <i class="ph ph-caret-down text-lg sm:text-xl transition-transform duration-300" id="chevron-${person.id}"></i>
                        </div>
                    </div>

                    <!-- Contenido Acordeón (Histórico) -->
                    <div id="acc-${person.id}" class="hidden border-t border-dark-border/50 bg-slate-900/60 p-4 rounded-b-xl cursor-default" onclick="event.stopPropagation()">
                        <h4 class="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wider flex items-center gap-2">
                            <i class="ph ph-clock-counter-clockwise"></i> Histórico Reciente
                        </h4>
                        <div class="flex gap-3 overflow-x-auto pb-2 snap-x scrollbar-thin scrollbar-thumb-slate-600 scrollbar-track-transparent">
                            ${historyCardsHtml}
                        </div>
                    </div>
                </div>`;

                leaderboardContainer.insertAdjacentHTML('beforeend', rowHtml);
            });

            requestAnimationFrame(() => {
                setTimeout(() => {
                    document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                        bar.style.width = bar.getAttribute('data-width');
                    });
                }, 100);
            });
        }

        // ── RENDERIZAR MATRIZ HISTÓRICA DETALLADA ──
        function renderHistoricalMatrix(data) {
            if(data.length === 0) return;
            
            // 1. Usamos el historial del primer usuario para construir el encabezado
            // Colocando la META debajo del nombre del mes, una sola vez.
            let headerHtml = `
                <div class="text-center flex items-center justify-center" title="Racha consecutiva de meses cumpliendo">
                    <span class="text-slate-400 font-bold text-xs"><i class="ph-fill ph-fire text-orange-500"></i> Racha</span>
                </div>
                <div class="flex items-center text-slate-300">Miembro del Equipo</div>
            `;
            
            data[0].history.forEach((hist, idx) => {
                const isCurrent = idx === data[0].history.length - 1;
                headerHtml += `
                    <div class="text-center flex flex-col items-center justify-center py-1 ${isCurrent ? 'bg-brand-glow/10 rounded-lg border border-brand-glow/20' : ''}">
                        <span class="${isCurrent ? 'text-brand-glow font-bold' : 'text-slate-300'}">${hist.month}</span>
                        <span class="text-[10px] text-slate-500 font-normal mt-0.5 tracking-wide">Meta: ${currencyFormatter.format(hist.meta)}</span>
                    </div>`;
            });
            matrixHeader.innerHTML = headerHtml;

            const matrixData = [...data].sort((a, b) => {
                if(b.streak !== a.streak) return b.streak - a.streak;
                return b.percentage - a.percentage;
            });

            matrixContainer.innerHTML = '';
            
            matrixData.forEach(person => {
                // Estilo de la racha más refinado
                let streakBadge = '-';
                if (person.streak >= 6) streakBadge = `<span class="px-2 py-1 rounded-md bg-gradient-to-r from-orange-500/20 to-amber-500/20 text-orange-400 text-xs font-bold border border-orange-500/30 shadow-[0_0_10px_rgba(249,115,22,0.2)]" title="¡6 Meses Perfectos!">🏆 x${person.streak}</span>`;
                else if (person.streak >= 3) streakBadge = `<span class="px-2 py-1 rounded-md bg-orange-500/10 text-orange-400 text-xs font-bold border border-orange-500/20">🔥 x${person.streak}</span>`;
                else if (person.streak > 0) streakBadge = `<span class="px-2 py-1 rounded-md bg-slate-800 text-slate-400 text-xs font-bold border border-slate-700/50">x${person.streak}</span>`;

                let monthsHtml = '';
                person.history.forEach((hist, idx) => {
                    const isCurrent = idx === person.history.length - 1;
                    
                    // Lógica de colores refinada para cada "tarjeta" mensual
                    let bgColor = 'bg-slate-800/20';
                    let borderColor = 'border-slate-700/30';
                    let moneyColor = 'text-slate-200';
                    let pctBg = 'bg-slate-700/50';
                    let pctText = 'text-slate-300';
                    let iconHtml = '';
                    let progressWidth = Math.min(hist.percentage, 100);

                    if (hist.isOverGoal) {
                        bgColor = 'bg-emerald-900/20';
                        borderColor = 'border-emerald-500/30';
                        moneyColor = 'text-emerald-400';
                        pctBg = 'bg-emerald-500/20';
                        pctText = 'text-emerald-400';
                        iconHtml = '<i class="ph-fill ph-check-circle text-emerald-400 mr-1.5 text-sm"></i>';
                    } else if (hist.percentage >= 80) {
                        bgColor = 'bg-amber-900/10';
                        borderColor = 'border-amber-500/30';
                        moneyColor = 'text-amber-400';
                        pctBg = 'bg-amber-500/20';
                        pctText = 'text-amber-400';
                    } else {
                        pctBg = 'bg-rose-500/10';
                        pctText = 'text-rose-400';
                    }

                    // Cuadro de mes individual refinado
                    monthsHtml += `
                        <div class="flex items-center justify-center p-1">
                            <div class="w-full h-full flex flex-col items-center justify-center p-2 rounded-lg ${bgColor} border ${borderColor} relative overflow-hidden transition-transform duration-300 hover:scale-[1.03] hover:shadow-lg cursor-default">
                                <div class="font-bold ${moneyColor} text-[13px] flex items-center mb-1.5">
                                    ${iconHtml}${currencyFormatter.format(hist.ventas)}
                                </div>
                                <div class="text-[10px] font-bold px-1.5 py-0.5 rounded-md ${pctBg} ${pctText}">
                                    ${hist.percentage.toFixed(0)}%
                                </div>
                                <!-- Línea de progreso inferior -->
                                <div class="absolute bottom-0 left-0 h-[2px] bg-slate-800/50 w-full">
                                    <div class="h-full ${hist.isOverGoal ? 'bg-emerald-400' : (hist.percentage >= 80 ? 'bg-amber-400' : 'bg-brand-glow')} transition-all duration-1000" style="width: ${progressWidth}%"></div>
                                </div>
                            </div>
                        </div>`;
                });

                const rowHtml = `
                    <div class="grid grid-cols-[4rem_160px_repeat(6,minmax(120px,1fr))] gap-2 px-4 py-1.5 border-b border-dark-border/50 hover:bg-slate-800/40 transition-colors items-center group">
                        <div class="text-center flex justify-center items-center h-full">${streakBadge}</div>
                        <div class="font-semibold text-slate-200 truncate pr-2 group-hover:text-white transition-colors">${person.nombre}</div>
                        ${monthsHtml}
                    </div>
                `;
                matrixContainer.insertAdjacentHTML('beforeend', rowHtml);
            });
        }

        function updateStats(data) {
            document.getElementById('stat-total-team').innerText = data.length;
            document.getElementById('stat-achievers').innerText = data.filter(p => p.ventas >= p.meta).length;
            document.getElementById('stat-total-money').innerText = currencyFormatter.format(data.reduce((s, p) => s + p.ventas, 0));
        }

        function setLoading(isLoading) {
            loadingState.style.display = isLoading ? 'flex' : 'none';
        }

        window.onload = () => {
            updateCurrentMonth();
            fetchData();
        };
    </script>
</body>
</html>
